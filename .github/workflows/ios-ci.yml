name: iOS CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for private API keys
        run: ci_scripts/check_secrets.sh
      - name: Validate asset catalog JSON
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          for path in Path('Saman/Assets.xcassets').rglob('Contents.json'):
              json.load(path.open())
          print('asset catalogs JSON OK')
          PY

  xcodebuild:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Build (compile app + tests)
        run: |
          set -o pipefail
          # Compile-only gate. We intentionally do NOT run `xcodebuild test` in CI:
          #   * The SamanTests unit target is hosted by the Saman app, so running it
          #     launches the full app. In the sandboxed CI simulator that launch is
          #     flaky (RevenueCat/Supabase init + a network-gated auth splash), which
          #     makes the test action crash "before starting test execution".
          #   * The SamanUITests templates have the same app-launch dependency.
          # `build-for-testing` compiles the app AND every test target (full compile
          # coverage of test code too) without launching anything, and a generic
          # destination avoids depending on a specific simulator being installed.
          xcodebuild build-for-testing \
            -project Saman.xcodeproj \
            -scheme Saman \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
