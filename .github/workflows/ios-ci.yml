name: iOS CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for private API keys
        run: ci_scripts/check_secrets.sh
      - name: Validate asset catalog JSON
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          for path in Path('Saman/Assets.xcassets').rglob('Contents.json'):
              json.load(path.open())
          print('asset catalogs JSON OK')
          PY

  xcodebuild:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Build and test
        run: |
          xcodebuild test \
            -project Saman.xcodeproj \
            -scheme Saman \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO
