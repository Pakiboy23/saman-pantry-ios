name: iOS CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for private API keys
        run: ci_scripts/check_secrets.sh
      - name: Validate asset catalog JSON
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          for path in Path('Saman/Assets.xcassets').rglob('Contents.json'):
              json.load(path.open())
          print('asset catalogs JSON OK')
          PY

  xcodebuild:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Build and test
        run: |
          set -o pipefail
          echo "Available simulators:"
          xcrun simctl list devices available | grep -E 'iPhone|iPad' || true
          # Runner images vary on which simulators exist, so pick one dynamically
          # instead of hard-pinning a device name.
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [0-9]+( Pro( Max)?| Plus)?' | head -1 || true)
          if [ -z "$DEVICE" ]; then
            echo "::warning::No iPhone simulator available; compiling only (build-for-testing)."
            xcodebuild build-for-testing \
              -project Saman.xcodeproj \
              -scheme Saman \
              -destination 'generic/platform=iOS Simulator' \
              CODE_SIGNING_ALLOWED=NO
            exit 0
          fi
          echo "Using simulator: $DEVICE"
          # Run only the unit tests. The UI test targets are Apple templates that
          # launch the full app and hang on the network-gated auth splash in CI;
          # they are still compiled (full build coverage) but not executed.
          xcodebuild test \
            -project Saman.xcodeproj \
            -scheme Saman \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            -only-testing:SamanTests \
            CODE_SIGNING_ALLOWED=NO
